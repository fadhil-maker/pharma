<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pharmacy Clinical Tracker - Clinician Dashboard for managing drug interactions">
    <title>⚕️ JSON Engine Dashboard — Pharmacy Clinical Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #f0f4f8;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(99, 102, 241, 0.25);
            --accent: #4f46e5;
            --accent-light: #6366f1;
            --cyan: #0891b2;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 25% 25%, rgba(79, 70, 229, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 75% 75%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
            z-index: -1;
        }

        /* ── Header ──────────────────────────────────── */
        .header {
            padding: 32px 24px 24px;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left h1 {
            font-size: clamp(22px, 4vw, 32px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-left p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header-actions a, .header-actions button {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-portal {
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid rgba(6, 182, 212, 0.3) !important;
            color: var(--cyan);
        }
        .btn-portal:hover { background: rgba(6, 182, 212, 0.25); }

        /* ── Container ───────────────────────────────── */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ── Card ─────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 24px;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
            transition: border-color 0.3s ease;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── Form elements ───────────────────────────── */
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.4);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
        }
        textarea { resize: vertical; min-height: 80px; }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
        }
        .btn-danger {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            padding: 6px 12px;
            width: auto;
            border-radius: 6px;
            font-size: 12px;
        }

        /* ── Table ────────────────────────────────────── */
        .table-wrapper {
            overflow-x: auto;
            background: white;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }
        th {
            background: rgba(241, 245, 249, 0.6);
            padding: 14px 16px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 11px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        td {
            padding: 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            vertical-align: top;
        }
        .remedy-cell { color: var(--text-muted); }
        .sev-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 11px;
        }
        .sev-low { background: #dcfce7; color: #166534; }
        .sev-med { background: #fef3c7; color: #92400e; }
        .sev-high { background: #fee2e2; color: #991b1b; }
        .sev-critical { background: #7f1d1d; color: white; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #22c55e 0%, #f59e0b 50%, #ef4444 100%);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1>⚙️ JSON Rules Engine</h1>
        <p>Live management of the timeline algorithmic engine.</p>
    </div>
    <div class="header-actions">
        <a href="index.html" class="btn-portal">← Back to Patient Portal</a>
    </div>
</div>

<div class="container">

    <!-- Add Rule Card -->
    <div class="card">
        <div class="card-title">➕ Inject New Rule to JSON Engine</div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Drug Class A</label>
                <input type="text" id="groupA" placeholder="e.g. @nsaid" required>
            </div>
            <div class="form-group">
                <label>Drug Class B</label>
                <input type="text" id="groupB" placeholder="e.g. @ssri" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
            <label>Contraindication Severity (<span id="severityValue">5</span>/10)</label>
            <div style="display:flex; gap: 14px; align-items:center; margin-top: 8px;">
                <input type="range" id="severitySlider" min="1" max="10" value="5" oninput="updateSeverityDisplay()">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
            <label>Reaction Description</label>
            <textarea id="reactionText" placeholder="e.g. Increased risk of gastrointestinal bleeding..."></textarea>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label>Clinical Remedy / Override (Optional)</label>
            <textarea id="remedyText" placeholder="e.g. Co-administer PPI if combination is strictly necessary."></textarea>
        </div>

        <button class="btn" onclick="saveRule()">Inject Rule into Engine</button>
    </div>

    <!-- Active Rules Table -->
    <div class="card">
        <div class="card-title">📚 Active Engine Rules</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Group A</th>
                        <th>Group B</th>
                        <th>Severity</th>
                        <th>Reaction</th>
                        <th>Remedy</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="rulesTable">
                    <tr><td colspan="6">Loading JSON Engine Rules...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
    ? 'http://127.0.0.1:8000' 
    : 'https://pharma.shanudigicore.com';

document.addEventListener('DOMContentLoaded', () => {
    loadRules();
    updateSeverityDisplay();
});

function updateSeverityDisplay() {
    const val = parseInt(document.getElementById('severitySlider').value);
    document.getElementById('severityValue').textContent = val;
}

async function loadRules() {
    try {
        const res = await fetch(`${API_BASE}/api/engine/rules/`);
        const data = await res.json();
        
        const tbody = document.getElementById('rulesTable');
        if (data.rules.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">No rules found in JSON engine.</td></tr>';
            return;
        }

        tbody.innerHTML = data.rules.map((r, index) => {
            const sevClass = r.severity <= 3 ? 'sev-low' : r.severity <= 7 ? 'sev-med' : r.severity === 10 ? 'sev-critical' : 'sev-high';
            return `<tr>
                <td><strong>${r.group_a}</strong></td>
                <td><strong>${r.group_b}</strong></td>
                <td><span class="sev-badge ${sevClass}">${r.severity}</span></td>
                <td>${r.reaction}</td>
                <td class="remedy-cell">${r.remedy || '—'}</td>
                <td><button class="btn btn-danger" onclick="deleteRule(${index})">Delete</button></td>
            </tr>`;
        }).join('');
    } catch (err) {
        document.getElementById('rulesTable').innerHTML = '<tr><td colspan="6" style="color:red;">Error loading rules from engine.</td></tr>';
    }
}

async function saveRule() {
    const groupA = document.getElementById('groupA').value.trim();
    const groupB = document.getElementById('groupB').value.trim();
    const severity = document.getElementById('severitySlider').value;
    const reaction = document.getElementById('reactionText').value.trim();
    const remedy = document.getElementById('remedyText').value.trim();

    if (!groupA || !groupB || !reaction) {
        alert("Group A, Group B, and Reaction are required!");
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/engine/rules/add/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                group_a: groupA,
                group_b: groupB,
                severity: severity,
                reaction: reaction,
                remedy: remedy
            })
        });

        if (res.ok) {
            document.getElementById('groupA').value = '';
            document.getElementById('groupB').value = '';
            document.getElementById('reactionText').value = '';
            document.getElementById('remedyText').value = '';
            loadRules();
        } else {
            alert("Failed to inject rule.");
        }
    } catch (err) {
        console.error(err);
    }
}

async function deleteRule(index) {
    if (!confirm("Are you sure you want to delete this rule from the JSON engine?")) return;
    
    try {
        const res = await fetch(`${API_BASE}/api/engine/rules/delete/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ index: index })
        });
        if (res.ok) {
            loadRules();
        } else {
            alert("Failed to delete rule.");
        }
    } catch (err) {
        console.error(err);
    }
}
</script>
</body>
</html>
